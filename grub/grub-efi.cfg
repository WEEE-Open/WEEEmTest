if loadfont unicode ; then
    set gfxmode=1024x768,800x600,auto
    set gfxpayload=800x600,1024x768
    terminal_output gfxterm
fi

insmod jpeg
background_image /boot/grub/splash.jpg

set color_normal=light-gray/black
set menu_color_normal=white/black
set menu_color_highlight=black/light-green

set default=0
set timeout=-1

insmod linux

menuentry "Start WEEEmTest, use built-in support for USB keyboards" {
    linux /EFI/BOOT/memtest keyboard=both
}
menuentry "Start WEEEmTest, use BIOS legacy emulation for USB keyboards" {
    linux /EFI/BOOT/memtest keyboard=legacy
}
menuentry "Start WEEEmTest, disable SMP and memory identification" {
    linux /EFI/BOOT/memtest nosmp nosm nobench
}
